<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" width="1600" height="1000" role="img" aria-label="Results dashboard with export, hide, delete, and reply">
  <defs>
    <linearGradient id="rbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f6f7ef"/>
      <stop offset="100%" stop-color="#eeefe7"/>
    </linearGradient>
    <filter id="rShadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="4" dy="8" stdDeviation="12" flood-color="#151515" flood-opacity="0.10"/>
    </filter>
  </defs>

  <rect width="1600" height="1000" fill="url(#rbg)"/>

  <!-- Window -->
  <g filter="url(#rShadow)">
    <rect x="80" y="80" width="1440" height="840" rx="14" fill="#ffffff" stroke="#d6d3c7"/>
    <rect x="80" y="80" width="1440" height="52" rx="14" fill="#eeefe7"/>
    <rect x="80" y="124" width="1440" height="10" fill="#eeefe7"/>
    <line x1="80" y1="132" x2="1520" y2="132" stroke="#d6d3c7"/>
    <circle cx="108" cy="106" r="6" fill="#f3665c"/>
    <circle cx="128" cy="106" r="6" fill="#f6c75a"/>
    <circle cx="148" cy="106" r="6" fill="#58c88f"/>
    <text x="180" y="111" font-family="Inter, sans-serif" font-size="13" font-weight="500" fill="#676565">forge / applications / results</text>

    <!-- Header row -->
    <text x="112" y="190" font-family="Inter, sans-serif" font-size="28" font-weight="700" fill="#151515" letter-spacing="-0.5">Results</text>
    <text x="112" y="218" font-family="Inter, sans-serif" font-size="14" fill="#676565">142 submissions · 118 approved · 24 denied</text>

    <!-- Toolbar -->
    <rect x="1060" y="172" width="140" height="38" rx="8" fill="#ffffff" stroke="#d6d3c7"/>
    <text x="1130" y="196" font-family="Inter, sans-serif" font-size="13" font-weight="500" fill="#151515" text-anchor="middle">Download CSV</text>
    <rect x="1212" y="172" width="140" height="38" rx="8" fill="#ffffff" stroke="#d6d3c7"/>
    <text x="1282" y="196" font-family="Inter, sans-serif" font-size="13" font-weight="500" fill="#151515" text-anchor="middle">Download PDF</text>
    <rect x="1364" y="172" width="140" height="38" rx="8" fill="#151515"/>
    <text x="1434" y="196" font-family="Inter, sans-serif" font-size="13" font-weight="500" fill="#ffffff" text-anchor="middle">Show hidden</text>

    <!-- Table header -->
    <rect x="112" y="248" width="1296" height="44" rx="8" fill="#fafbf4" stroke="#e3e0d3"/>
    <text x="132" y="274" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#676565" letter-spacing="1">STATUS</text>
    <text x="292" y="274" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#676565" letter-spacing="1">SUBMITTER</text>
    <text x="552" y="274" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#676565" letter-spacing="1">SUMMARY</text>
    <text x="1060" y="274" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#676565" letter-spacing="1">SUBMITTED</text>
    <text x="1260" y="274" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#676565" letter-spacing="1">ACTIONS</text>

    <!-- Row 1 approved -->
    <rect x="112" y="304" width="1296" height="72" rx="8" fill="#ffffff" stroke="#e3e0d3"/>
    <rect x="132" y="326" width="84" height="28" rx="14" fill="#e5f3eb"/>
    <text x="174" y="345" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#2d8e64" text-anchor="middle">Approved</text>
    <text x="292" y="342" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#151515">@priya</text>
    <text x="292" y="362" font-family="Inter, sans-serif" font-size="12" fill="#676565">priya@convex.dev</text>
    <text x="552" y="342" font-family="Inter, sans-serif" font-size="14" fill="#151515">I build with Convex every day and</text>
    <text x="552" y="362" font-family="Inter, sans-serif" font-size="13" fill="#676565">want to contribute to the community…</text>
    <text x="1060" y="342" font-family="Inter, sans-serif" font-size="13" fill="#151515">Today 14:28</text>
    <text x="1060" y="362" font-family="Inter, sans-serif" font-size="12" fill="#676565">by @wayne</text>
    <text x="1260" y="345" font-family="Inter, sans-serif" font-size="13" font-weight="500" fill="#151515">Reply · Hide · Delete</text>

    <!-- Row 2 pending -->
    <rect x="112" y="388" width="1296" height="72" rx="8" fill="#ffffff" stroke="#e3e0d3"/>
    <rect x="132" y="410" width="84" height="28" rx="14" fill="#fff4dc"/>
    <text x="174" y="429" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#a87c00" text-anchor="middle">Pending</text>
    <text x="292" y="426" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#151515">@jordan</text>
    <text x="292" y="446" font-family="Inter, sans-serif" font-size="12" fill="#676565">jordan@convex.dev</text>
    <text x="552" y="426" font-family="Inter, sans-serif" font-size="14" fill="#151515">Found a bug reproducing on 1.25.0</text>
    <text x="552" y="446" font-family="Inter, sans-serif" font-size="13" fill="#676565">with code fence attached in field 3…</text>
    <text x="1060" y="426" font-family="Inter, sans-serif" font-size="13" fill="#151515">Today 14:10</text>
    <rect x="1260" y="406" width="76" height="32" rx="6" fill="#2d8e64"/>
    <text x="1298" y="426" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#ffffff" text-anchor="middle">Approve</text>
    <rect x="1344" y="406" width="58" height="32" rx="6" fill="#c14040"/>
    <text x="1373" y="426" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#ffffff" text-anchor="middle">Deny</text>

    <!-- Row 3 denied -->
    <rect x="112" y="472" width="1296" height="72" rx="8" fill="#ffffff" stroke="#e3e0d3"/>
    <rect x="132" y="494" width="84" height="28" rx="14" fill="#fbe5e5"/>
    <text x="174" y="513" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#c14040" text-anchor="middle">Denied</text>
    <text x="292" y="510" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#151515">@tomas</text>
    <text x="292" y="530" font-family="Inter, sans-serif" font-size="12" fill="#676565">tomas@convex.dev</text>
    <text x="552" y="510" font-family="Inter, sans-serif" font-size="14" fill="#151515">Duplicate of #1247. Reason logged</text>
    <text x="552" y="530" font-family="Inter, sans-serif" font-size="13" fill="#676565">to audit log and DMed to submitter.</text>
    <text x="1060" y="510" font-family="Inter, sans-serif" font-size="13" fill="#151515">Yesterday 18:02</text>
    <text x="1060" y="530" font-family="Inter, sans-serif" font-size="12" fill="#676565">by @wayne</text>
    <text x="1260" y="513" font-family="Inter, sans-serif" font-size="13" font-weight="500" fill="#151515">Reply · Hide · Delete</text>

    <!-- Row 4 ticket -->
    <rect x="112" y="556" width="1296" height="72" rx="8" fill="#ffffff" stroke="#e3e0d3"/>
    <rect x="132" y="578" width="96" height="28" rx="14" fill="#fff0e6"/>
    <text x="180" y="597" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#f54e00" text-anchor="middle">In progress</text>
    <text x="292" y="594" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#151515">@kay</text>
    <text x="292" y="614" font-family="Inter, sans-serif" font-size="12" fill="#676565">kay@convex.dev</text>
    <text x="552" y="594" font-family="Inter, sans-serif" font-size="14" fill="#151515">Ticket · claimed by @wayne</text>
    <text x="552" y="614" font-family="Inter, sans-serif" font-size="13" fill="#676565">Last activity 14 min ago in #support</text>
    <text x="1060" y="594" font-family="Inter, sans-serif" font-size="13" fill="#151515">Today 13:01</text>
    <text x="1260" y="597" font-family="Inter, sans-serif" font-size="13" font-weight="500" fill="#151515">Reply · Open thread</text>

    <!-- Row 5 hidden -->
    <rect x="112" y="640" width="1296" height="72" rx="8" fill="#fafbf4" stroke="#e3e0d3" stroke-dasharray="4 4"/>
    <rect x="132" y="662" width="84" height="28" rx="14" fill="#ece9da"/>
    <text x="174" y="681" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#676565" text-anchor="middle">Hidden</text>
    <text x="292" y="678" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#676565">@spam</text>
    <text x="552" y="678" font-family="Inter, sans-serif" font-size="14" fill="#676565">Hidden from results, kept in audit log</text>
    <text x="1060" y="678" font-family="Inter, sans-serif" font-size="13" fill="#676565">Today 09:14</text>
    <text x="1260" y="681" font-family="Inter, sans-serif" font-size="13" font-weight="500" fill="#676565">Unhide · Delete</text>

    <!-- Reply composer at bottom -->
    <rect x="112" y="740" width="1296" height="140" rx="10" fill="#fafbf4" stroke="#e3e0d3"/>
    <text x="132" y="770" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#676565" letter-spacing="1">REPLY IN DISCORD</text>
    <rect x="132" y="784" width="1104" height="76" rx="8" fill="#ffffff" stroke="#d6d3c7"/>
    <text x="148" y="810" font-family="Inter, sans-serif" font-size="13" fill="#151515">Thanks for submitting, @priya. We will be in touch this week with next steps.</text>
    <text x="148" y="834" font-family="Inter, sans-serif" font-size="12" fill="#676565">Posts as Forge bot in the thread · no pings</text>
    <rect x="1260" y="796" width="132" height="52" rx="8" fill="#f54e00"/>
    <text x="1326" y="826" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#ffffff" text-anchor="middle">Send reply</text>
  </g>
</svg>
