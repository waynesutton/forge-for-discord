<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" width="1600" height="1000" role="img" aria-label="Mod queue review embed with approve and deny buttons">
  <defs>
    <linearGradient id="qbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f4f5ec"/>
      <stop offset="100%" stop-color="#eeefe7"/>
    </linearGradient>
    <filter id="qShadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="6" dy="10" stdDeviation="14" flood-color="#151515" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="1600" height="1000" fill="url(#qbg)"/>

  <!-- Large Discord channel window -->
  <g filter="url(#qShadow)">
    <rect x="140" y="110" width="1320" height="780" rx="16" fill="#313338"/>

    <!-- Channel header -->
    <rect x="140" y="110" width="1320" height="58" rx="16" fill="#2b2d31"/>
    <rect x="140" y="156" width="1320" height="12" fill="#2b2d31"/>
    <line x1="140" y1="168" x2="1460" y2="168" stroke="#1f2024" stroke-width="1"/>
    <text x="180" y="148" font-family="Inter, sans-serif" font-size="18" font-weight="700" fill="#b5bac1">#</text>
    <text x="204" y="148" font-family="Inter, sans-serif" font-size="16" font-weight="600" fill="#f2f3f5">mod-queue</text>
    <text x="330" y="148" font-family="Inter, sans-serif" font-size="13" fill="#80848e">3 moderators online</text>

    <!-- Submission card / embed -->
    <rect x="200" y="212" width="60" height="60" rx="30" fill="#5865f2"/>
    <text x="230" y="252" font-family="Inter, sans-serif" font-size="22" font-weight="700" fill="#ffffff" text-anchor="middle">F</text>
    <text x="284" y="240" font-family="Inter, sans-serif" font-size="16" font-weight="700" fill="#f2f3f5">Forge</text>
    <rect x="346" y="222" width="44" height="20" rx="4" fill="#5865f2"/>
    <text x="368" y="236" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#ffffff" text-anchor="middle">APP</text>
    <text x="404" y="240" font-family="Inter, sans-serif" font-size="13" fill="#949ba4">Today at 2:14 PM</text>

    <!-- Embed bar -->
    <rect x="284" y="260" width="1060" height="540" rx="4" fill="#2b2d31"/>
    <rect x="284" y="260" width="4" height="540" fill="#f54e00"/>

    <!-- Embed content -->
    <text x="316" y="296" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#b5bac1">COMMUNITY APPLICATION</text>
    <text x="316" y="336" font-family="Inter, sans-serif" font-size="22" font-weight="700" fill="#f2f3f5">New submission pending review</text>

    <text x="316" y="386" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#f2f3f5">Your Discord handle</text>
    <text x="316" y="410" font-family="Inter, sans-serif" font-size="14" fill="#dbdee1">@waynesutton</text>

    <text x="316" y="450" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#f2f3f5">Contact email</text>
    <text x="316" y="474" font-family="Inter, sans-serif" font-size="14" fill="#dbdee1">wayne@convex.dev</text>

    <text x="316" y="514" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#f2f3f5">Why do you want to join</text>
    <text x="316" y="540" font-family="Inter, sans-serif" font-size="14" fill="#dbdee1">I build with Convex every day and want to ship my</text>
    <text x="316" y="562" font-family="Inter, sans-serif" font-size="14" fill="#dbdee1">first Discord bot using Forge. Already running /apply in</text>
    <text x="316" y="584" font-family="Inter, sans-serif" font-size="14" fill="#dbdee1">the staging server and loving the review flow.</text>

    <text x="316" y="624" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#f2f3f5">Hours per week</text>
    <text x="316" y="648" font-family="Inter, sans-serif" font-size="14" fill="#dbdee1">10</text>

    <line x1="316" y1="680" x2="1324" y2="680" stroke="#3f4249" stroke-width="1"/>
    <text x="316" y="708" font-family="Inter, sans-serif" font-size="12" fill="#949ba4">Submitted 2 min ago · ID 28c1f9</text>

    <!-- Buttons -->
    <rect x="316" y="732" width="128" height="44" rx="6" fill="#248046"/>
    <text x="380" y="760" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle">Approve</text>

    <rect x="460" y="732" width="128" height="44" rx="6" fill="#da373c"/>
    <text x="524" y="760" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle">Deny</text>

    <rect x="604" y="732" width="144" height="44" rx="6" fill="#4e5058"/>
    <text x="676" y="760" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle">Open ticket</text>

    <!-- Second message: decision -->
  </g>

  <!-- Floating label pill -->
  <g>
    <rect x="1184" y="200" width="216" height="44" rx="22" fill="#ffffff" stroke="#d6d3c7" filter="url(#qShadow)"/>
    <circle cx="1210" cy="222" r="8" fill="#2d8e64"/>
    <text x="1230" y="227" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#151515">Real time via Convex</text>
  </g>
</svg>
